<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WASM Synth</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><polyline points='2,16 5,10 8,20 11,8 14,22 17,12 20,18 23,6 26,24 29,14' fill='none' stroke='%23ff6b8a' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="synth" tabindex="0">
    <h1>WASM SYNTH</h1>
    <div class="section">
      <h2>Keyboard</h2>
      <div class="keyboard-bar">
        <div class="note-picker">
          <button id="note-picker-btn" class="note-picker-btn">C4</button>
          <div id="note-grid" class="note-grid"></div>
        </div>
        <div class="octave-hint">Z oct down / X oct up</div>
      </div>
      <div id="capture-zone">
        <input id="capture-input" type="text" autocomplete="off" spellcheck="false">
        <span id="capture-label">Click here to play</span>
      </div>
      <div id="piano"></div>
      <div class="visualizer-wrap">
        <canvas id="visualizer" width="800" height="100" style="display:block;width:100%;height:100px;background:#000;"></canvas>
      </div>
    </div>

    <div class="section">
      <h2>Presets</h2>
      <div class="presets" id="presets"></div>
    </div>

    <div class="section">
      <h2>Oscillators</h2>
      <div class="controls">
        <div class="control osc-stack">
          <div class="osc-row">
            <label>Osc 1</label>
            <select data-param="0">
              <option value="1" selected>Saw</option>
              <option value="0">Sine</option>
              <option value="2">Square</option>
              <option value="3">Tri</option>
            </select>
          </div>
          <div class="osc-row">
            <label>Osc 2</label>
            <select data-param="1">
              <option value="1" selected>Saw</option>
              <option value="0">Sine</option>
              <option value="2">Square</option>
              <option value="3">Tri</option>
            </select>
          </div>
        </div>
        <div class="control">
          <label>Mix</label>
          <input type="range" data-param="2" min="0" max="1" step="0.01" value="0.3">
          <span class="value">0.30</span>
        </div>
        <div class="control">
          <label>Detune</label>
          <input type="range" data-param="3" min="0" max="1" step="0.01" value="0.10">
          <span class="value">0.10</span>
        </div>
        <div class="control">
          <label>Osc2 Oct</label>
          <input type="range" data-param="4" min="-2" max="2" step="1" value="0">
          <span class="value">0</span>
        </div>
        <div class="control">
          <label>Noise</label>
          <input type="range" data-param="5" min="0" max="1" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Filter</h2>
      <div class="controls">
        <div class="control">
          <label>Type</label>
          <div class="filter-type-toggle" data-param="12">
            <button class="filter-type-btn active" data-value="0">LP</button>
            <button class="filter-type-btn" data-value="1">HP</button>
            <button class="filter-type-btn" data-value="2">BP</button>
            <button class="filter-type-btn" data-value="3">Notch</button>
          </div>
        </div>
        <div class="control">
          <label>Cutoff</label>
          <input type="range" data-param="10" min="20" max="18000" step="1" value="8000">
          <span class="value">8000</span>
        </div>
        <div class="control">
          <label>Reso</label>
          <input type="range" data-param="11" min="0" max="0.99" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Filter Envelope</h2>
      <div class="controls">
        <div class="control">
          <label>Amount</label>
          <input type="range" data-param="13" min="-1" max="1" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
        <div class="control">
          <label>Attack</label>
          <input type="range" data-param="14" min="0.001" max="2" step="0.001" value="0.01">
          <span class="value">0.01</span>
        </div>
        <div class="control">
          <label>Decay</label>
          <input type="range" data-param="15" min="0.001" max="2" step="0.001" value="0.3">
          <span class="value">0.30</span>
        </div>
        <div class="control">
          <label>Sustain</label>
          <input type="range" data-param="16" min="0" max="1" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
        <div class="control">
          <label>Release</label>
          <input type="range" data-param="17" min="0.001" max="3" step="0.001" value="0.3">
          <span class="value">0.30</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>LFO</h2>
      <div class="controls">
        <div class="control">
          <label>Wave</label>
          <div class="filter-type-toggle" data-param="27">
            <button class="filter-type-btn active" data-value="0">Sin</button>
            <button class="filter-type-btn" data-value="1">Tri</button>
            <button class="filter-type-btn" data-value="2">Saw</button>
            <button class="filter-type-btn" data-value="3">Sq</button>
            <button class="filter-type-btn" data-value="4">S&amp;H</button>
          </div>
        </div>
        <div class="control">
          <label>Target</label>
          <div class="filter-type-toggle" data-param="28">
            <button class="filter-type-btn active" data-value="0">Filter</button>
            <button class="filter-type-btn" data-value="1">Pitch</button>
            <button class="filter-type-btn" data-value="2">Amp</button>
          </div>
        </div>
        <div class="control">
          <label>Rate</label>
          <input type="range" data-param="25" min="0.05" max="20" step="0.05" value="1">
          <span class="value">1.00</span>
        </div>
        <div class="control">
          <label>Amount</label>
          <input type="range" data-param="26" min="0" max="1" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Pitch Envelope</h2>
      <div class="controls">
        <div class="control">
          <label>Amount</label>
          <input type="range" data-param="18" min="-1" max="1" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
        <div class="control">
          <label>Attack</label>
          <input type="range" data-param="19" min="0.001" max="2" step="0.001" value="0.01">
          <span class="value">0.01</span>
        </div>
        <div class="control">
          <label>Decay</label>
          <input type="range" data-param="40" min="0.001" max="2" step="0.001" value="0.1">
          <span class="value">0.10</span>
        </div>
        <div class="control">
          <label>Sustain</label>
          <input type="range" data-param="41" min="0" max="1" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
        <div class="control">
          <label>Release</label>
          <input type="range" data-param="42" min="0.001" max="3" step="0.001" value="0.1">
          <span class="value">0.10</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Amp Envelope</h2>
      <div class="controls">
        <div class="control">
          <label>Attack</label>
          <input type="range" data-param="20" min="0.001" max="2" step="0.001" value="0.01">
          <span class="value">0.01</span>
        </div>
        <div class="control">
          <label>Decay</label>
          <input type="range" data-param="21" min="0.001" max="2" step="0.001" value="0.2">
          <span class="value">0.20</span>
        </div>
        <div class="control">
          <label>Sustain</label>
          <input type="range" data-param="22" min="0" max="1" step="0.01" value="0.7">
          <span class="value">0.70</span>
        </div>
        <div class="control">
          <label>Release</label>
          <input type="range" data-param="23" min="0.001" max="3" step="0.001" value="0.3">
          <span class="value">0.30</span>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Output</h2>
      <div class="controls">
        <div class="control">
          <label>Drive</label>
          <input type="range" data-param="31" min="0" max="1" step="0.01" value="0">
          <span class="value">0.00</span>
        </div>
        <div class="control">
          <label>Gain</label>
          <input type="range" data-param="30" min="0" max="1" step="0.01" value="0.5">
          <span class="value">0.50</span>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
